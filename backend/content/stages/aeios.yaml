              - id: burden_enemy_mishap
                name: "Burden — Enemy"
                description: Name an NPC with active cause against you. They may appear during play at GM discretion.
                category: burden
          - id: mishap_burden
            label: Burden
            description: You begin play saddled with a persistent complication — a vow, a secret, an obligation you cannot easily shed.
            choice_key: burden
            attribute_modifiers: []
            features_granted:
              - id: burden_complication_mishap
                name: "Burden — Complication"
                description: Begin play saddled with a persistent complication. Define it in detail at the Bonds and Burdens step.
                category: burden
          - id: mishap_wound
            label: Wound
            description: You start play with Body reduced by 1. The pool recovers normally during play.
            choice_key: wound
            attribute_modifiers:
              - attribute: body
                delta: -1
            features_granted:
              - id: burden_wound_mishap
                name: "Burden — Wound"
                description: Start play with Body at current value −1. The pool recovers normally during play.
                category: burden

  # ──────────────────────────────────────────────────────────────
  # STAGE 15: MUSTER OUT WITH KNACK
  # ──────────────────────────────────────────────────────────────
  muster_out_with_knack:
    id: muster_out_with_knack
    name: Muster Out
    description: You leave your career voluntarily. Choose a Knack — a passive trait that bends the rules in a small but meaningful way. Then decide whether to start another career or proceed to Bonds and Burdens.
    order_hint: 15
    age_cost: 0
    default_next_stage_id: bonds_and_burdens
    events:
      - id: knack_choice
        name: Choose a Knack
        description: Select one Knack from the full list. Honor-system — choose a Knack appropriate to your career. Knacks are passive traits; they do not require activation.
        event_type: choice
        choice_prompt: Which Knack do you earn from this career?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: knack_ironhide
            label: Ironhide
            description: Reduce Body pool damage from all sources by 1 (minimum 1). Earned by those who have been hit too many times to count.
            choice_key: ironhide
            attribute_modifiers: []
            features_granted:
              - id: knack_ironhide_feat
                name: Ironhide
                description: Reduce Body pool damage from all sources by 1 (minimum 1).
                category: knack
          - id: knack_danger_sense
            label: Danger Sense
            description: You are never surprised. You may always act in the first round of an ambush.
            choice_key: danger_sense
            attribute_modifiers: []
            features_granted:
              - id: knack_danger_sense_feat
                name: Danger Sense
                description: You are never surprised. You may always act in the first round of an ambush.
                category: knack
          - id: knack_silver_tongue
            label: Silver Tongue
            description: When you fail a social skill roll that would be penalized by your Power pool status, you may reroll once per scene.
            choice_key: silver_tongue
            attribute_modifiers: []
            features_granted:
              - id: knack_silver_tongue_feat
                name: Silver Tongue
                description: When you fail a social skill roll that would be penalized by your Power pool status, you may reroll once per scene.
                category: knack
          - id: knack_predators_eye
            label: "Predator's Eye"
            description: You always know the approximate Body pool level of enemies you have observed for at least one round.
            choice_key: predators_eye
            attribute_modifiers: []
            features_granted:
              - id: knack_predators_eye_feat
                name: "Predator's Eye"
                description: You always know the approximate Body pool level of enemies you have observed for at least one round.
                category: knack
          - id: knack_hard_to_kill
            label: Hard to Kill
            description: When your Body pool would reach zero, roll 2d6 vs. difficulty 9. On success, remain at 1 Body instead. Once per session.
            choice_key: hard_to_kill
            attribute_modifiers: []
            features_granted:
              - id: knack_hard_to_kill_feat
                name: Hard to Kill
                description: When your Body pool would reach zero, make a flat 2d6 roll vs. difficulty 9 (no Skill Rank bonus). On a success, you remain at 1 Body instead. Once per session.
                category: knack
          - id: knack_travelers_luck
            label: "Traveler's Luck"
            description: Once per session, declare you happen to have a mundane item not on your sheet. It fits in one hand.
            choice_key: travelers_luck
            attribute_modifiers: []
            features_granted:
              - id: knack_travelers_luck_feat
                name: "Traveler's Luck"
                description: Once per session, declare you happen to have a mundane item not on your sheet. It fits in one hand.
                category: knack
          - id: knack_iron_nerve
            label: Iron Nerve
            description: Focus pool damage from horror, supernatural, or mind-affecting sources is halved (round down).
            choice_key: iron_nerve
            attribute_modifiers: []
            features_granted:
              - id: knack_iron_nerve_feat
                name: Iron Nerve
                description: Focus pool damage from horror, supernatural, or mind-affecting sources is halved (round down).
                category: knack

      - id: career_or_finish_knack
        name: Another Career or Proceed?
        description: You may start another career — entering at career_entry to choose a new path — or proceed to Bonds and Burdens to finish character creation.
        event_type: choice
        choice_prompt: What do you do next?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: next_career_knack
            label: Start Another Career
            description: Return to Career Entry and choose a new career path. You will serve at least one term before mustering out again.
            choice_key: next_career
            next_stage_override: career_entry
            attribute_modifiers: []
            features_granted: []
          - id: proceed_bonds_knack
            label: Proceed to Bonds and Burdens
            description: Your Early Years are complete. Move on to define your Bond and Burden.
            choice_key: proceed
            attribute_modifiers: []
            features_granted: []

  # ──────────────────────────────────────────────────────────────
  # STAGE 16: MUSTER OUT (after mishap — no knack)
  # ──────────────────────────────────────────────────────────────
  muster_out:
    id: muster_out
    name: "Muster Out (Mishap)"
    description: Your career ended by mishap — no Knack is earned. You may start another career or proceed to Bonds and Burdens.
    order_hint: 16
    age_cost: 0
    default_next_stage_id: bonds_and_burdens
    events:
      - id: career_or_finish_mishap
        name: Another Career or Proceed?
        description: You may start another career — entering at career_entry to choose a new path — or proceed to Bonds and Burdens to finish character creation.
        event_type: choice
        choice_prompt: What do you do next?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: next_career_mishap
            label: Start Another Career
            description: Return to Career Entry and choose a new career path. First term carries no Survival roll.
            choice_key: next_career
            next_stage_override: career_entry
            attribute_modifiers: []
            features_granted: []
          - id: proceed_bonds_mishap
            label: Proceed to Bonds and Burdens
            description: Your Early Years are complete. Move on to define your Bond and Burden.
            choice_key: proceed
            attribute_modifiers: []
            features_granted: []

  # ──────────────────────────────────────────────────────────────
  # STAGE 17: BONDS AND BURDENS
  # ──────────────────────────────────────────────────────────────
  bonds_and_burdens:
    id: bonds_and_burdens
    name: Bonds and Burdens
    description: Sword and Sorcery heroes are not free. Define one Bond — a meaningful obligation — and one Burden — a complication you cannot easily escape.
    order_hint: 17
    age_cost: 0
    default_next_stage_id: fate
    events:
      - id: bond_choice
        name: Choose a Bond
        description: A Bond is a meaningful obligation to a person, place, cause, vow, or ideal. Once per session, when you act directly in service of your Bond at real cost or risk to yourself, add a bonus die to one roll.
        event_type: choice
        choice_prompt: What is your Bond?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: bond_person
            label: A Person
            description: You are bound to a specific individual — a debt of loyalty, love, or obligation that you will not let die without a fight.
            choice_key: person
            attribute_modifiers: []
            features_granted:
              - id: bond_person_feat
                name: Bond — A Person
                description: "A meaningful obligation to a person. Write who they are and what you owe or feel. Mechanical benefit: once per session, when you act in direct service of this Bond at real cost or risk, add a bonus die to one roll."
                category: bond
          - id: bond_place
            label: A Place
            description: You are bound to a specific location — somewhere you will return to, protect, or restore no matter what stands in the way.
            choice_key: place
            attribute_modifiers: []
            features_granted:
              - id: bond_place_feat
                name: Bond — A Place
                description: "A meaningful obligation to a place. Write where it is and what it means to you. Mechanical benefit: once per session, when you act in direct service of this Bond at real cost or risk, add a bonus die to one roll."
                category: bond
          - id: bond_cause
            label: A Cause
            description: You serve something larger than yourself — a principle, a people, or an ideal worth dying for.
            choice_key: cause
            attribute_modifiers: []
            features_granted:
              - id: bond_cause_feat
                name: Bond — A Cause
                description: "A meaningful obligation to a cause. Write what it is and why it matters to you. Mechanical benefit: once per session, when you act in direct service of this Bond at real cost or risk, add a bonus die to one roll."
                category: bond
          - id: bond_vow
            label: A Vow
            description: A solemn oath that binds you — spoken aloud, witnessed, or sworn in your own blood. You do not break it.
            choice_key: vow
            attribute_modifiers: []
            features_granted:
              - id: bond_vow_feat
                name: Bond — A Vow
                description: "A solemn oath that binds you. Write the exact words of the vow and who witnessed it. Mechanical benefit: once per session, when you act in direct service of this Bond at real cost or risk, add a bonus die to one roll."
                category: bond
          - id: bond_ideal
            label: An Ideal
            description: A principle you refuse to abandon — a code of conduct, a moral line, or a belief you hold even when it costs you.
            choice_key: ideal
            attribute_modifiers: []
            features_granted:
              - id: bond_ideal_feat
                name: Bond — An Ideal
                description: "A principle you refuse to abandon. Write what it is and how you came to hold it. Mechanical benefit: once per session, when you act in direct service of this Bond at real cost or risk, add a bonus die to one roll."
                category: bond

      - id: burden_choice
        name: Choose a Burden
        description: A Burden is a complication you cannot easily escape — an enemy, an addiction, a debt, a secret, or a vow of vengeance. The GM may invoke it to introduce complications. Accepting the complication is a recognized trigger for advancement.
        event_type: choice
        choice_prompt: What is your Burden?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: burden_rival_out
            label: A Rival
            description: Someone who works against your interests — not to kill you (yet), but to undermine, embarrass, or obstruct you.
            choice_key: rival
            attribute_modifiers: []
            features_granted:
              - id: burden_rival_feat
                name: "Burden — A Rival"
                description: Someone who works against your interests. Name them and write what they want. The GM may invoke this to introduce complications.
                category: burden
          - id: burden_addiction_out
            label: An Addiction
            description: A pull you cannot entirely resist — a substance, a behavior, a compulsion that surfaces under pressure.
            choice_key: addiction
            attribute_modifiers: []
            features_granted:
              - id: burden_addiction_feat
                name: "Burden — An Addiction"
                description: A pull you cannot entirely resist. Name it and describe when it surfaces. The GM may invoke this to introduce complications.
                category: burden
          - id: burden_debt_out
            label: A Debt
            description: You owe something significant to someone who expects repayment — in coin, in service, or in kind.
            choice_key: debt
            attribute_modifiers: []
            features_granted:
              - id: burden_debt_feat
                name: "Burden — A Debt"
                description: You owe something significant. Name the creditor and write what is owed. The GM may invoke this to introduce complications.
                category: burden
          - id: burden_secret_out
            label: A Dark Secret
            description: Something that must stay hidden. If it came out, it would cost you — reputation, safety, or the people you care about.
            choice_key: secret
            attribute_modifiers: []
            features_granted:
              - id: burden_secret_feat
                name: "Burden — A Dark Secret"
                description: Something that must stay hidden. Write what it is and who would be harmed if it emerged. The GM may invoke this to introduce complications.
                category: burden
          - id: burden_vengeance_out
            label: A Vow of Vengeance
            description: An enemy you are sworn to destroy. The vow defines a portion of your purpose. It may outlive you.
            choice_key: vengeance
            attribute_modifiers: []
            features_granted:
              - id: burden_vengeance_feat
                name: "Burden — A Vow of Vengeance"
                description: An enemy you are sworn to destroy. Name them and write what they did. The GM may invoke this to introduce complications.
                category: burden

  # ──────────────────────────────────────────────────────────────
  # STAGE 18: FATE (terminal)
  # ──────────────────────────────────────────────────────────────
  fate:
    id: fate
    name: Fate
    description: Every character in Aeios is moving toward something. Write a short, poetic statement in second person — your character's likely doom. It is a compass for play, not a prophecy. You may outrun it, embrace it, or die trying to rewrite it.
    order_hint: 18
    age_cost: 0
    default_next_stage_id: null
    events:
      - id: fate_declaration
        name: Fate Declared
        description: Your character's arc compass is set. Gain a bonus die when acting in direct opposition to your Fate — genuine risk to deny the trajectory it describes. Playing toward your Fate is an advancement trigger.
        event_type: automatic
        outcomes:
          - id: fate_auto_outcome
            label: Fate Declared
            description: Your Fate is declared. Write a short poetic statement in second person as your character's arc compass.
            attribute_modifiers: []
            features_granted:
              - id: fate_declared
                name: Fate Declared
                description: "Write a short poetic statement in second person as your character's arc compass. Example: 'You will find what you are looking for. You will wish you hadn't.' Mechanical benefit: gain a bonus die when acting in direct opposition to your Fate (genuine risk to deny it). Playing toward your Fate is a recognized advancement trigger."
                category: fate
