id: aeios
name: Aeios
version: "1.0"
starting_stage_id: childhood
base_attributes:
  body: 3
  stamina: 3
  focus: 3
  power: 3
  age: 15

stages:

  # ──────────────────────────────────────────────────────────────
  # STAGE 1: CHILDHOOD
  # ──────────────────────────────────────────────────────────────
  childhood:
    id: childhood
    name: Childhood
    description: Three rolls define the world you grew up in — your family's wealth, where you lived, and the social structure surrounding you. Together they surface skill options; choose one at Rank 0.
    order_hint: 1
    age_cost: 0
    default_next_stage_id: career_entry
    events:
      - id: wealth_roll
        name: Wealth
        description: Roll 1d6 to determine your family's economic circumstances. On a 6, treat as 5 (Wealthy).
        event_type: table_roll
        dice_expression: 1d6
        outcomes:
          - id: wealth_destitute
            label: Destitute
            description: The family had nothing, or there was no family. Survival was not a given.
            roll_min: 1
            roll_max: 1
            context_updates:
              revealed_survival: "yes"
              revealed_thievery: "yes"
            features_granted:
              - id: bg_wealth_destitute
                name: Destitute
                description: The family had nothing, or there was no family. Survival was not a given.
                category: background
          - id: wealth_poor
            label: Poor
            description: Enough to survive, not enough for anything else. The body was the primary asset.
            roll_min: 2
            roll_max: 2
            context_updates:
              revealed_athletics: "yes"
            features_granted:
              - id: bg_wealth_poor
                name: Poor
                description: Enough to survive, not enough for anything else. The body was the primary asset.
                category: background
          - id: wealth_common
            label: Common
            description: A trade, a modest home, maybe some savings. Enough, and no more.
            roll_min: 3
            roll_max: 3
            context_updates:
              revealed_craftsmanship: "yes"
              revealed_commerce: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_wealth_common
                name: Common
                description: A trade, a modest home, maybe some savings. Enough, and no more.
                category: background
          - id: wealth_prosperous
            label: Prosperous
            description: More than enough. Wealth enough to have choices and exert social influence.
            roll_min: 4
            roll_max: 4
            context_updates:
              revealed_commerce: "yes"
              revealed_influence: "yes"
            features_granted:
              - id: bg_wealth_prosperous
                name: Prosperous
                description: More than enough. Wealth enough to have choices and exert social influence.
                category: background
          - id: wealth_wealthy
            label: Wealthy
            description: Wealth that commands. Money is not the constraint — access and reputation are the game.
            roll_min: 5
            roll_max: 6
            context_updates:
              revealed_scholarship: "yes"
              revealed_influence: "yes"
            features_granted:
              - id: bg_wealth_wealthy
                name: Wealthy
                description: Wealth that commands. Money is not the constraint — access and reputation are the game.
                category: background

      - id: locale_roll
        name: Locale
        description: Roll 1d6 to determine where you grew up, from deep wilderness to great city. On a 6, treat as 5 (Great City).
        event_type: table_roll
        dice_expression: 1d6
        outcomes:
          - id: locale_wilderness
            label: Wilderness
            description: Beyond the edge of maps. The nearest neighbor might be days away.
            roll_min: 1
            roll_max: 1
            context_updates:
              revealed_survival: "yes"
              revealed_navigation: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_locale_wilderness
                name: Wilderness
                description: Beyond the edge of maps. The nearest neighbor might be days away.
                category: background
          - id: locale_rural
            label: Rural
            description: Settled agricultural land — villages, farms, managed forest.
            roll_min: 2
            roll_max: 2
            context_updates:
              revealed_athletics: "yes"
              revealed_craftsmanship: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_locale_rural
                name: Rural
                description: Settled agricultural land — villages, farms, managed forest.
                category: background
          - id: locale_town
            label: Small Town
            description: A real settlement with an inn, a market, a temple, a constable.
            roll_min: 3
            roll_max: 3
            context_updates:
              revealed_craftsmanship: "yes"
              revealed_commerce: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_locale_town
                name: Small Town
                description: A real settlement with an inn, a market, a temple, a constable.
                category: background
          - id: locale_city
            label: City
            description: Walls, guilds, crime, crowds. A city is a world unto itself.
            roll_min: 4
            roll_max: 4
            context_updates:
              revealed_stealth: "yes"
              revealed_commerce: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_locale_city
                name: City
                description: Walls, guilds, crime, crowds. A city is a world unto itself.
                category: background
          - id: locale_great_city
            label: Great City
            description: Ancient, vast, layered. So large it contains multitudes.
            roll_min: 5
            roll_max: 6
            context_updates:
              revealed_scholarship: "yes"
              revealed_influence: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_locale_great_city
                name: Great City
                description: Ancient, vast, layered. So large it contains multitudes.
                category: background

      - id: community_roll
        name: Community
        description: Roll 1d6 to determine the social structure you grew up within. On a 6, treat as 5 (Court / Great Institution).
        event_type: table_roll
        dice_expression: 1d6
        outcomes:
          - id: community_solitary
            label: Solitary
            description: Raised largely alone or effectively cut off. People were scarce; you learned to need them less.
            roll_min: 1
            roll_max: 1
            context_updates:
              revealed_survival: "yes"
              revealed_stealth: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_community_solitary
                name: Solitary
                description: Raised largely alone or effectively cut off. People were scarce; you learned to need them less.
                category: background
          - id: community_band
            label: Small Band
            description: A handful of people bound by necessity or blood. Tight bonds, narrow world.
            roll_min: 2
            roll_max: 2
            context_updates:
              revealed_melee: "yes"
              revealed_athletics: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_community_band
                name: Small Band
                description: A handful of people bound by necessity or blood. Tight bonds, narrow world.
                category: background
          - id: community_congregation
            label: Congregation
            description: A true community of dozens to a few hundred, mostly known to each other.
            roll_min: 3
            roll_max: 3
            context_updates:
              revealed_craftsmanship: "yes"
              revealed_commerce: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_community_congregation
                name: Congregation
                description: A true community of dozens to a few hundred, mostly known to each other.
                category: background
          - id: community_organization
            label: Organization
            description: Hundreds or more with formal structure — membership, rules, and ranks.
            roll_min: 4
            roll_max: 4
            context_updates:
              revealed_commerce: "yes"
              revealed_influence: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_community_organization
                name: Organization
                description: Hundreds or more with formal structure — membership, rules, and ranks.
                category: background
          - id: community_court
            label: "Court / Great Institution"
            description: Thousands of people, layered hierarchy, complex politics. Navigating the structure was its own discipline.
            roll_min: 5
            roll_max: 6
            context_updates:
              revealed_scholarship: "yes"
              revealed_influence: "yes"
            attribute_modifiers: []
            features_granted:
              - id: bg_community_court
                name: "Court / Great Institution"
                description: Thousands of people, layered hierarchy, complex politics. Navigating the structure was its own discipline.
                category: background

      - id: childhood_skill
        name: Childhood Skill
        description: From all skills surfaced across your three rolls, choose one. That skill is held at Rank 0 — basic familiarity that removes the untrained penalty die.
        event_type: choice
        choice_prompt: Which skill became second nature during your childhood?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: cs_survival
            label: Survival
            description: You learned early how to stay alive when circumstances turned against you.
            choice_key: survival
            requires_context:
              revealed_survival: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_survival_0
                name: Survival Rank 0
                description: Basic familiarity with survival — removes the untrained penalty die.
                category: skill
          - id: cs_thievery
            label: Thievery
            description: Necessity taught you to take what wasn't offered.
            choice_key: thievery
            requires_context:
              revealed_thievery: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_thievery_0
                name: Thievery Rank 0
                description: Basic familiarity with thievery — removes the untrained penalty die.
                category: skill
          - id: cs_athletics
            label: Athletics
            description: Physical work or outdoor life built a capable body from an early age.
            choice_key: athletics
            requires_context:
              revealed_athletics: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_athletics_0
                name: Athletics Rank 0
                description: Basic familiarity with athletics — removes the untrained penalty die.
                category: skill
          - id: cs_craftsmanship
            label: Craftsmanship
            description: A trade household or practical upbringing gave you skill with your hands.
            choice_key: craftsmanship
            requires_context:
              revealed_craftsmanship: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_craftsmanship_0
                name: Craftsmanship Rank 0
                description: Basic familiarity with craftsmanship — removes the untrained penalty die.
                category: skill
          - id: cs_commerce
            label: Commerce
            description: Growing up around trade gave you an eye for value and negotiation.
            choice_key: commerce
            requires_context:
              revealed_commerce: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_commerce_0
                name: Commerce Rank 0
                description: Basic familiarity with commerce — removes the untrained penalty die.
                category: skill
          - id: cs_influence
            label: Influence
            description: Social environments taught you how to read people and make yourself heard.
            choice_key: influence
            requires_context:
              revealed_influence: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_influence_0
                name: Influence Rank 0
                description: Basic familiarity with influence — removes the untrained penalty die.
                category: skill
          - id: cs_scholarship
            label: Scholarship
            description: Access to knowledge — books, learned people, institutions — ignited a habit of study.
            choice_key: scholarship
            requires_context:
              revealed_scholarship: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_scholarship_0
                name: Scholarship Rank 0
                description: Basic familiarity with scholarship — removes the untrained penalty die.
                category: skill
          - id: cs_melee
            label: Melee
            description: Fighting was part of life — by necessity, culture, or circumstance.
            choice_key: melee
            requires_context:
              revealed_melee: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_melee_0
                name: Melee Rank 0
                description: Basic familiarity with melee combat — removes the untrained penalty die.
                category: skill
          - id: cs_stealth
            label: Stealth
            description: Learning to move unseen was survival in the environment you grew up in.
            choice_key: stealth
            requires_context:
              revealed_stealth: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_stealth_0
                name: Stealth Rank 0
                description: Basic familiarity with stealth — removes the untrained penalty die.
                category: skill
          - id: cs_navigation
            label: Navigation
            description: Growing up beyond settled land gave you an instinct for direction and terrain.
            choice_key: navigation
            requires_context:
              revealed_navigation: ["yes"]
            attribute_modifiers: []
            features_granted:
              - id: skill_navigation_0
                name: Navigation Rank 0
                description: Basic familiarity with navigation — removes the untrained penalty die.
                category: skill

  # ──────────────────────────────────────────────────────────────
  # STAGE 2: CAREER ENTRY
  # ──────────────────────────────────────────────────────────────
  career_entry:
    id: career_entry
    name: Career Entry
    description: Choose your career. All careers are freely available. Your choice grants Basic Training at Rank 0 in two skills and sets your career path.
    order_hint: 2
    age_cost: 0
    default_next_stage_id: career_blade
    events:
      - id: career_choice
        name: Choose a Career
        description: Select the career you are entering. You gain both Basic Training skills at Rank 0. You may change careers in future cycles by mustering out and returning here.
        event_type: choice
        choice_prompt: Which career do you enter?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: enter_blade
            label: "Blade — Professional Fighting"
            description: Sellswords, city guardsmen, pit-fighters. You sell your body's strength for coin, order, or spectacle. Basic Training — Melee, Defense.
            choice_key: blade
            context_updates:
              current_career: "blade"
            next_stage_override: career_blade
            attribute_modifiers: []
            features_granted:
              - id: bt_melee_0
                name: Melee Rank 0
                description: Basic Training — removes the untrained penalty die for melee combat.
                category: skill
              - id: bt_defense_0
                name: Defense Rank 0
                description: Basic Training — removes the untrained penalty die for defense.
                category: skill
          - id: enter_scout
            label: "Scout — Wilderness and Frontier Work"
            description: Guides, outriders, trappers. You live beyond the edge of maps and bring back what you find. Basic Training — Survival, Navigation (Wayfinding).
            choice_key: scout
            context_updates:
              current_career: "scout"
            next_stage_override: career_scout
            attribute_modifiers: []
            features_granted:
              - id: bt_survival_0
                name: Survival Rank 0
                description: Basic Training — removes the untrained penalty die for survival.
                category: skill
              - id: bt_navigation_0
                name: Navigation (Wayfinding) Rank 0
                description: Basic Training — removes the untrained penalty die for navigation and wayfinding.
                category: skill
          - id: enter_shadow
            label: "Shadow — Criminal and Covert Work"
            description: Cutpurses, nighthands, smugglers. You live outside the law and learn to move without being seen. Basic Training — Stealth, Thievery.
            choice_key: shadow
            context_updates:
              current_career: "shadow"
            next_stage_override: career_shadow
            attribute_modifiers: []
            features_granted:
              - id: bt_stealth_0
                name: Stealth Rank 0
                description: Basic Training — removes the untrained penalty die for stealth.
                category: skill
              - id: bt_thievery_0
                name: Thievery Rank 0
                description: Basic Training — removes the untrained penalty die for thievery.
                category: skill
          - id: enter_sailor
            label: "Sailor — Sea and River Life"
            description: Oarsmen, river traders, corsairs. You know how to read water and when to hold on. Basic Training — Seamanship, Athletics.
            choice_key: sailor
            context_updates:
              current_career: "sailor"
            next_stage_override: career_sailor
            attribute_modifiers: []
            features_granted:
              - id: bt_seamanship_0
                name: Seamanship Rank 0
                description: Basic Training — removes the untrained penalty die for seamanship.
                category: skill
              - id: bt_athletics_0
                name: Athletics Rank 0
                description: Basic Training — removes the untrained penalty die for athletics.
                category: skill
          - id: enter_temple
            label: "Temple — Religious and Sacred Orders"
            description: Acolytes, healers, temple guards. You serve something larger than yourself and learn its language. Basic Training — Influence, Lore (Theology).
            choice_key: temple
            context_updates:
              current_career: "temple"
            next_stage_override: career_temple
            attribute_modifiers: []
            features_granted:
              - id: bt_influence_0
                name: Influence Rank 0
                description: Basic Training — removes the untrained penalty die for influence.
                category: skill
              - id: bt_lore_theology_0
                name: Lore (Theology) Rank 0
                description: Basic Training — removes the untrained penalty die for theological lore.
                category: skill
          - id: enter_scholar
            label: "Scholar — Knowledge and Learning"
            description: Scribes, antiquarians, occultists. You trade in knowing — and discover that some knowledge has a price. Basic Training — Lore, Commerce.
            choice_key: scholar
            context_updates:
              current_career: "scholar"
            next_stage_override: career_scholar
            attribute_modifiers: []
            features_granted:
              - id: bt_lore_0
                name: Lore Rank 0
                description: Basic Training — removes the untrained penalty die for lore and scholarship.
                category: skill
              - id: bt_commerce_0
                name: Commerce Rank 0
                description: Basic Training — removes the untrained penalty die for commerce.
                category: skill
          - id: enter_court
            label: "Court — Political and Social Maneuvering"
            description: Courtiers, spymasters' agents, heralds. The sharpest blade in a palace is a secret. Basic Training — Influence, Deception.
            choice_key: court
            context_updates:
              current_career: "court"
            next_stage_override: career_court
            attribute_modifiers: []
            features_granted:
              - id: bt_influence_court_0
                name: Influence Rank 0
                description: Basic Training — removes the untrained penalty die for influence.
                category: skill
              - id: bt_deception_0
                name: Deception Rank 0
                description: Basic Training — removes the untrained penalty die for deception and intrigue.
                category: skill
          - id: enter_tradesman
            label: "Tradesman — Commerce and Craft"
            description: Artisans, merchants, physicians. You build things, sell things, or keep people alive long enough to do both. Basic Training — Commerce, Artisan.
            choice_key: tradesman
            context_updates:
              current_career: "tradesman"
            next_stage_override: career_tradesman
            attribute_modifiers: []
            features_granted:
              - id: bt_commerce_trade_0
                name: Commerce Rank 0
                description: Basic Training — removes the untrained penalty die for commerce.
                category: skill
              - id: bt_artisan_0
                name: Artisan Rank 0
                description: Basic Training — removes the untrained penalty die for artisan crafts.
                category: skill
          - id: enter_wanderer
            label: "Wanderer — The Rootless Path"
            description: Vagabonds, pilgrims, exiles. You go from place to place and learn that every road eventually circles back. Basic Training — Survival, Athletics.
            choice_key: wanderer
            context_updates:
              current_career: "wanderer"
            next_stage_override: career_wanderer
            attribute_modifiers: []
            features_granted:
              - id: bt_survival_wand_0
                name: Survival Rank 0
                description: Basic Training — removes the untrained penalty die for survival.
                category: skill
              - id: bt_athletics_wand_0
                name: Athletics Rank 0
                description: Basic Training — removes the untrained penalty die for athletics.
                category: skill
          - id: enter_warband
            label: "Warband — Tribal Warrior Culture"
            description: Tribal warriors, raiders, war-shamans. You live by the strength of your people and the clarity of battle. Basic Training — Melee, Athletics.
            choice_key: warband
            context_updates:
              current_career: "warband"
            next_stage_override: career_warband
            attribute_modifiers: []
            features_granted:
              - id: bt_melee_warband_0
                name: Melee Rank 0
                description: Basic Training — removes the untrained penalty die for melee combat.
                category: skill
              - id: bt_athletics_warband_0
                name: Athletics Rank 0
                description: Basic Training — removes the untrained penalty die for athletics.
                category: skill

  # ──────────────────────────────────────────────────────────────
  # CAREER STAGES (3–12): one per career, age_cost 4 each
  # Each has: sub_assignment → life_event → survival_roll
  # ──────────────────────────────────────────────────────────────

  career_blade:
    id: career_blade
    name: "Career — Blade"
    description: A term as a professional fighter — sellsword, city guard, or pit-fighter. Dangerous work that shapes the body and hardens the will.
    order_hint: 3
    age_cost: 4
    default_next_stage_id: career_decision
    events:
      - id: blade_sub
        name: Sub-assignment
        description: Choose your specialization within the Blade career for this term.
        event_type: choice
        choice_prompt: Which sub-assignment do you pursue?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: blade_sellsword
            label: Sellsword
            description: You sell your blade to whoever pays — caravan guards, mercenary companies, private security.
            choice_key: sellsword
            attribute_modifiers: []
            features_granted:
              - id: sa_melee_0
                name: Melee Rank 0
                description: Sub-assignment skill — removes the untrained penalty die for melee combat.
                category: skill
          - id: blade_city_guard
            label: City Guard
            description: You serve as a keeper of civic order — watch duty, patrol, and the occasional riot.
            choice_key: city_guard
            attribute_modifiers: []
            features_granted:
              - id: sa_defense_0
                name: Defense Rank 0
                description: Sub-assignment skill — removes the untrained penalty die for defense.
                category: skill
          - id: blade_pit_fighter
            label: Pit-Fighter
            description: You fight for crowds in the ring, the pit, or the arena — raw skill against opponents.
            choice_key: pit_fighter
            attribute_modifiers: []
            features_granted:
              - id: sa_athletics_0
                name: Athletics Rank 0
                description: Sub-assignment skill — removes the untrained penalty die for athletics.
                category: skill

      - id: blade_life
        name: Life Event
        description: Roll 1d6 to see what happened during this term of the Blade career.
        event_type: table_roll
        dice_expression: 1d6
        outcomes:
          - id: blade_life_1
            label: Caravan Run
            description: You guarded a caravan through hostile country and picked up something of the road.
            roll_min: 1
            roll_max: 1
            attribute_modifiers: []
            features_granted:
              - id: blade_nav_0
                name: Navigation Rank 0
                description: Time on the road through hostile country — removes the untrained penalty die for navigation.
                category: skill
          - id: blade_life_2
            label: A Fellow Blade
            description: A comrade-in-arms pulled you out of a losing fight. You owe them.
            roll_min: 2
            roll_max: 2
            attribute_modifiers: []
            features_granted:
              - id: blade_ally
                name: Ally — A Fellow Blade
                description: A comrade who pulled you out of a losing fight. They may call on you in return.
                category: contact
          - id: blade_life_3
            label: A Victory That Mattered
            description: A tournament, a battle, or a job done cleanly. Something you are proud of.
            roll_min: 3
            roll_max: 3
            attribute_modifiers: []
            features_granted:
              - id: blade_veteran
                name: Combat Veteran
                description: A victory that mattered — tournament, battle, or a job done cleanly. Record the details.
                category: skill
          - id: blade_life_4
            label: A Contract Gone Wrong
            description: Someone died who shouldn't have. A surviving party blames you.
            roll_min: 4
            roll_max: 4
            attribute_modifiers: []
            features_granted:
              - id: blade_rival
                name: Rival — A Wronged Party
                description: A contract went wrong and someone blames you for the outcome. They watch for an opportunity.
                category: contact
          - id: blade_life_5
            label: Long Garrison Months
            description: Nothing to do but drink. You found community at the bottom of a cup.
            roll_min: 5
            roll_max: 5
            attribute_modifiers: []
            features_granted:
              - id: blade_carousing_0
                name: Carousing Rank 0
                description: Long garrison months with nothing to do but drink — removes the untrained penalty die for carousing.
                category: skill
          - id: blade_life_6
            label: The Last One Standing
            description: You were the only survivor of a rout. An enemy — whoever ordered you into it — still draws breath.
            roll_min: 6
            roll_max: 6
            attribute_modifiers: []
            features_granted:
              - id: blade_enemy
                name: Enemy — Commander Who Sent You In
                description: You were the last one standing. Whoever ordered that charge still draws breath. The enmity is mutual.
                category: burden

      - id: blade_survival
        name: Survival Roll
        description: Roll 2d6 to determine whether you survive this term without serious mishap. 7 or higher means you made it through.
        event_type: table_roll
        dice_expression: 2d6
        outcomes:
          - id: blade_mishap
            label: Mishap
            description: Something went badly wrong this term. You are ejected from the Blade career.
            roll_min: 2
            roll_max: 6
            attribute_modifiers: []
            features_granted: []
            next_stage_override: career_mishap
          - id: blade_survived
            label: Survived the Term
            description: You made it through another term without serious incident.
            roll_min: 7
            roll_max: 12
            attribute_modifiers: []
            features_granted: []

  career_scout:
    id: career_scout
    name: "Career — Scout"
    description: A term as a wilderness professional — guide, outrider, or trapper. You live beyond the edge of maps and bring back what you find.
    order_hint: 4
    age_cost: 4
    default_next_stage_id: career_decision
    events:
      - id: scout_sub
        name: Sub-assignment
