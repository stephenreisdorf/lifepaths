        choice_prompt: What form does your mishap take?
        min_choices: 1
        max_choices: 1
        outcomes:
          - id: mishap_debt
            label: Debt
            description: You begin play significantly poorer — a failed venture, an unpaid employer, or a loan that came due badly.
            choice_key: debt
            attribute_modifiers: []
            features_granted:
              - id: burden_debt_mishap
                name: "Burden — Debt"
                description: Begin play significantly poorer. Work out the magnitude with the GM.
                category: burden
          - id: mishap_enemy
            label: Enemy
